    const root = document.documentElement;
    const themeBtn = document.getElementById("themeToggle");

    function applyTheme(theme) {
        root.classList.remove("light-mode", "dark-mode");
        root.classList.add(theme);
        localStorage.setItem("theme", theme);

        if (themeBtn) {
            themeBtn.textContent = theme === "dark-mode" ? "Light" : "Dark";
        }
    }

    const savedTheme = localStorage.getItem("theme");
    applyTheme(savedTheme === "dark-mode" ? "dark-mode" : "light-mode");

    function toggleTheme() {
        const nextTheme = root.classList.contains("dark-mode") ? "light-mode" : "dark-mode";
        applyTheme(nextTheme);
    }

    function shuffle(arr) {
        const a = arr.slice();
        for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
        }
        return a;
    }

    function getPool(mode) {
        if (mode === "current") return currentQuestions;
        if (mode === "alltime") return allTimeQuestions;
        return currentQuestions.concat(allTimeQuestions);
    }

    function buildQuiz(mode, count) {
        const pool = getPool(mode);
        const chosen = shuffle(pool).slice(0, count);
        return chosen.map(q => {
            const questionText = q.q || q.question;
            const answerText = q.a || q.answer;
            const options = shuffle(q.options || []);
            return { q: questionText, a: answerText, options };
        });
    }

    function updateStartState() {
        if (selectedMode && selectedCount) {
            startBtn.style.display = "inline-block";
        } else {
            startBtn.style.display = "none";
        }
    }

        btn.addEventListener("click", () => {
            selectedMode = btn.dataset.mode;
            document.querySelectorAll(".select-quiz-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            if (countCard) countCard.style.display = "block";
            if (modeCard) modeCard.style.display = "none";
            updateStartState();
        });
    });

    document.querySelectorAll(".select-count-btn").forEach(btn => {
        btn.addEventListener("click", () => {
            selectedCount = parseInt(btn.dataset.count, 10);
            document.querySelectorAll(".select-count-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
            updateStartState();
        });
    });

    if (startBtn) {
        startBtn.addEventListener("click", () => {
            quizData = buildQuiz(selectedMode, selectedCount);
            currentQuestion = 0;
            score = 0;
            setupView.style.display = "none";
            playView.style.display = "block";
            loadQuestion();
        });
    }

        randomBtn.addEventListener("click", () => {
            const modes = ["current", "alltime", "both"];

            selectedCount = questionCounts[Math.floor(Math.random() * questionCounts.length)];
            quizData = buildQuiz(selectedMode, selectedCount);
            currentQuestion = 0;
            score = 0;
            setupView.style.display = "none";
            playView.style.display = "block";
            loadQuestion();
        });
    }

    function loadQuestion() {
        const data = quizData[currentQuestion];
        document.getElementById('question-number').innerText = `Question ${currentQuestion + 1} of ${quizData.length}`;
        document.getElementById('question-text').innerText = data.q;
        document.getElementById('feedback').innerText = "";
        
        const optionsDiv = document.getElementById('options-container');
        optionsDiv.innerHTML = ""; 

        data.options.forEach(opt => {
            const btn = document.createElement('button');
            btn.innerText = opt;
            btn.className = "quiz-btn"; 
            btn.onclick = () => checkAnswer(opt, data.a);
            optionsDiv.appendChild(btn);
        });
    }

    function checkAnswer(selected, correct) {
        const feedback = document.getElementById('feedback');
        const buttons = document.querySelectorAll('#options-container .quiz-btn');
        buttons.forEach(b => b.disabled = true);

        if (selected === correct) {
            score++;
            feedback.innerText = "Correct!";
            feedback.style.color = "#27911d";
            feedback.style.fontSize = "24px";
        } else {
            feedback.innerText = "Incorrect!";
            feedback.style.color = "#bf0006";
            feedback.style.fontSize = "24px";
        }

        setTimeout(() => {
            currentQuestion++;
            if (currentQuestion < quizData.length) {
                loadQuestion();
            } else {
                showResults();
            }
        }, 700);
    }

    function getDifficultyWeight(level) {
        const key = String(level || '').toLowerCase();
        if (key === 'easy') return 1.0;
        if (key === 'medium') return 1.15;
        if (key === 'hard') return 1.3;
        if (key === 'impossible') return 1.5;
        return 1.0;
    }

    function showResults() {
        confetti({ particleCount: 300, spread: 100, origin: { y: 0.6 } });

        const user = localStorage.getItem('currentUser') || sessionStorage.getItem('currentUser');
        const scoreKey = user ? `BestScore_${user}` : 'BestScore_Guest';
        let personalBest = localStorage.getItem(scoreKey) || 0;

        const totalQuestions = quizData.length || 0;
        const accuracy = totalQuestions ? (score / totalQuestions) * 100 : 0;
        const avgDifficulty = totalQuestions
            ? quizData.reduce((sum, q) => sum + getDifficultyWeight(q.difficulty), 0) / totalQuestions
            : 1;
        const rankScore = accuracy * avgDifficulty;

        if (score > personalBest) {
            localStorage.setItem(scoreKey, score);
            personalBest = score;
        }

        if (user) {
            const leaderboardData = JSON.parse(localStorage.getItem('nfl_leaderboard')) || [];
            const profile = JSON.parse(localStorage.getItem(`profile_${user}`) || '{}');
            const avatar = profile.avatar || '';
            const displayName = profile.displayName || user;
            leaderboardData.push({
                name: user,
                displayName: displayName,
                avatar: avatar,
                score: score,
                total: totalQuestions,
                accuracy: accuracy,
                avgDifficulty: avgDifficulty,
                rankScore: rankScore,
                date: new Date().toLocaleDateString()
            });
            leaderboardData.sort((a, b) => (b.rankScore || 0) - (a.rankScore || 0));
            localStorage.setItem('nfl_leaderboard', JSON.stringify(leaderboardData.slice(0, 10)));
        }

        const container = document.getElementById('quiz-container');
        container.innerHTML = `
            <h1 style="font-size: 2rem;">Quiz Finished!</h1>
            <p style="font-size: 1.5rem; margin: 10px 0;">Your Score: ${score} / ${quizData.length}</p>
            <p style="font-size: 1.2rem; color: #27911d; margin-bottom: 20px; font-weight: bold;">
                🏆 My Best: ${personalBest} / ${quizData.length}
            </p>
            <button id="lb-btn" class="quiz-btn" style="background: #4CAF50; margin-bottom: 10px;">View the Leaderboard</button>
            <button onclick="location.reload()" class="quiz-btn">Try Again</button>
            <button onclick="resetBest()" class="quiz-btn" style="background-color: #FF5252; margin-top: 10px;">Reset Personal Best</button>
            <br><br><br>
            <a href="index.html" style="color: white; text-decoration: underline;">Back to Home</a>
        `;

        document.getElementById('lb-btn').onclick = function() {
            if (!user) {
                localStorage.setItem('pendingScore', score);
                localStorage.setItem('pendingScoreTotal', totalQuestions);
                localStorage.setItem('pendingScoreAccuracy', accuracy.toString());
                localStorage.setItem('pendingScoreAvgDifficulty', avgDifficulty.toString());
                localStorage.setItem('pendingScoreRank', rankScore.toString());
                if (confirm("Please login to view the leaderboard and save your score!")) {
                    localStorage.setItem('redirectAfterLogin', 'Leaderboard.html');
                    window.location.href = 'Login.html';
                }
            } else {
                window.location.href = 'Leaderboard.html';
            }
        };
    }

    function resetBest() {
        if (confirm("Are you sure you want to reset your personal best?")) {
            const user = localStorage.getItem('currentUser');
            const scoreKey = user ? `BestScore_${user}` : 'BestScore_Guest';
            localStorage.removeItem(scoreKey);
            location.reload();
        }
    }
</script>
